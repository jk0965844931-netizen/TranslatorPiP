name: Build Unsigned IPA

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write   # needed to create releases and upload assets

jobs:
  build:
    name: Build iOS IPA (Unsigned)
    runs-on: macos-14

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Select Xcode version
        run: |
          for v in 16.2 16.1 16.0 15.4 15.3 15.2; do
            if [ -d "/Applications/Xcode_${v}.app" ]; then
              sudo xcode-select -s "/Applications/Xcode_${v}.app/Contents/Developer"
              echo "Selected Xcode ${v}"
              break
            fi
          done
          xcodebuild -version

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build app (unsigned, LiveContainer-compatible)
        run: |
          set -euo pipefail
          xcodebuild \
            -project TranslatorPiP.xcodeproj \
            -scheme TranslatorPiP \
            -configuration Debug \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM="" \
            SUPPORTED_PLATFORMS=iphoneos \
            SUPPORTS_MACCATALYST=NO \
            SKIP_INSTALL=NO \
            SWIFT_OPTIMIZATION_LEVEL="-Onone" \
            SWIFT_WHOLE_MODULE_OPTIMIZATION=NO \
            GCC_OPTIMIZATION_LEVEL=0 \
            clean build \
            BUILD_DIR="$(pwd)/build" \
            2>&1 | tee build_output.log

          BINARY="build/Debug-iphoneos/TranslatorPiP.app/TranslatorPiP"
          if [ -f "$BINARY" ]; then
            SIZE=$(du -sh "$BINARY" | cut -f1)
            echo "✅ Binary found: $BINARY ($SIZE)"
          else
            echo "❌ Binary missing — build failed. Last 50 lines:"
            tail -50 build_output.log
            exit 1
          fi

      - name: Package IPA
        run: |
          set -euo pipefail
          APP_PATH="build/Debug-iphoneos/TranslatorPiP.app"
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/
          zip -qr TranslatorPiP_unsigned.ipa Payload
          IPA_SIZE=$(du -sh TranslatorPiP_unsigned.ipa | cut -f1)
          IPA_BYTES=$(stat -f%z TranslatorPiP_unsigned.ipa)
          echo "✅ IPA size: $IPA_SIZE ($IPA_BYTES bytes)"
          if [ "$IPA_BYTES" -lt 50000 ]; then
            echo "❌ IPA suspiciously small — packaging failed"
            exit 1
          fi

      - name: Publish GitHub Release (public download — no login needed)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="latest-build"
          REPO="${{ github.repository }}"
          SHA="${{ github.sha }}"
          SHORT_SHA="${SHA:0:7}"
          DATE=$(date -u +"%Y-%m-%d %H:%M UTC")

          # Delete old release + tag if exists (keep only the latest build)
          gh release delete "$TAG" --yes --repo "$REPO" 2>/dev/null || true
          git push origin ":refs/tags/$TAG" 2>/dev/null || true

          # Create new release
          gh release create "$TAG" \
            --repo "$REPO" \
            --title "TranslatorPiP Unsigned IPA (${DATE})" \
            --notes "**Unsigned IPA for LiveContainer / sideloading**

          Build: \`${SHORT_SHA}\` — ${DATE}

          **วิธีติดตั้ง:**
          1. ดาวน์โหลด \`TranslatorPiP_unsigned.ipa\` ด้านล่าง
          2. เปิด LiveContainer → กด + → เลือกไฟล์ IPA

          **วิธีใช้จับเสียงภายในเครื่อง:**
          1. กด \"เริ่มแปลเสียง\" ในแอพ
          2. เปิด Control Center → กดค้าง Screen Record
          3. เลือก \"TranslatorPiP\" → Start Broadcast
          4. กด \"เปิด PiP\" → หน้าต่างแปลจะลอยทับแอพอื่น" \
            --prerelease \
            TranslatorPiP_unsigned.ipa

          echo ""
          echo "✅ Public download URL:"
          echo "https://github.com/${REPO}/releases/download/${TAG}/TranslatorPiP_unsigned.ipa"

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build_output.log
          retention-days: 7
