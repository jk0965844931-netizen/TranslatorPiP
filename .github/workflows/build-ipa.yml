name: Build Unsigned IPA

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    name: Build iOS IPA (Unsigned)
    runs-on: macos-15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Select Xcode version
        run: sudo xcode-select -s /Applications/Xcode_16.app/Contents/Developer

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build app (unsigned)
        run: |
          xcodebuild \
            -project TranslatorPiP.xcodeproj \
            -scheme TranslatorPiP \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM="" \
            SUPPORTED_PLATFORMS=iphoneos \
            SUPPORTS_MACCATALYST=NO \
            ONLY_ACTIVE_ARCH=NO \
            "EXCLUDED_ARCHS[sdk=iphonesimulator*]=arm64 x86_64" \
            SKIP_INSTALL=NO \
            clean build \
            BUILD_DIR="$(pwd)/build"

      - name: Package IPA
        run: |
          set -e
          APP_PATH=$(find build -name "*.app" -maxdepth 5 | head -n 1)
          echo "Found app at: $APP_PATH"
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/
          zip -qr TranslatorPiP_unsigned.ipa Payload
          echo "IPA size: $(du -sh TranslatorPiP_unsigned.ipa | cut -f1)"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: TranslatorPiP-unsigned-ipa
          path: TranslatorPiP_unsigned.ipa
          retention-days: 30

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: build/**/*.log
          retention-days: 7
