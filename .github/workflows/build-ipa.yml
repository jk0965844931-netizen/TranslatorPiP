name: Build Unsigned IPA

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    name: Build iOS IPA (Unsigned)
    runs-on: macos-14

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Select Xcode version
        run: |
          # Pick newest available Xcode (avoids actool simulator-runtime bug in Xcode 16.0)
          for v in 16.2 16.1 16.0 15.4 15.3 15.2; do
            if [ -d "/Applications/Xcode_${v}.app" ]; then
              sudo xcode-select -s "/Applications/Xcode_${v}.app/Contents/Developer"
              echo "Selected Xcode ${v}"
              break
            fi
          done
          xcodebuild -version

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build app (unsigned, LiveContainer-compatible)
        run: |
          xcodebuild \
            -project TranslatorPiP.xcodeproj \
            -scheme TranslatorPiP \
            -configuration Debug \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM="" \
            SUPPORTED_PLATFORMS=iphoneos \
            SUPPORTS_MACCATALYST=NO \
            SKIP_INSTALL=NO \
            SWIFT_OPTIMIZATION_LEVEL="-Onone" \
            SWIFT_WHOLE_MODULE_OPTIMIZATION=NO \
            GCC_OPTIMIZATION_LEVEL=0 \
            clean build \
            BUILD_DIR="$(pwd)/build" \
            | xcpretty || true
          # Verify build produced the .app bundle
          test -d build/Debug-iphoneos/TranslatorPiP.app && echo "✅ Build succeeded" || (echo "❌ Build failed" && exit 1)

      - name: Package IPA
        run: |
          set -e
          APP_PATH=$(find build -name "*.app" -maxdepth 5 | head -n 1)
          echo "Found app at: $APP_PATH"
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/
          zip -qr TranslatorPiP_unsigned.ipa Payload
          echo "IPA size: $(du -sh TranslatorPiP_unsigned.ipa | cut -f1)"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: TranslatorPiP-unsigned-ipa
          path: TranslatorPiP_unsigned.ipa
          retention-days: 30

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            build/**/*.log
            ~/Library/Logs/DiagnosticReports/*.ips
          retention-days: 7
