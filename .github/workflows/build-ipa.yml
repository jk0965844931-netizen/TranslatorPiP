name: Build Unsigned IPA

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build iOS IPA (Unsigned)
    runs-on: macos-14

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Select Xcode version
        run: |
          for v in 16.2 16.1 16.0 15.4 15.3 15.2; do
            if [ -d "/Applications/Xcode_${v}.app" ]; then
              sudo xcode-select -s "/Applications/Xcode_${v}.app/Contents/Developer"
              echo "Selected Xcode ${v}"
              break
            fi
          done
          xcodebuild -version

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build app (unsigned, LiveContainer-compatible)
        run: |
          set -euo pipefail
          xcodebuild \
            -project TranslatorPiP.xcodeproj \
            -scheme TranslatorPiP \
            -configuration Debug \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM="" \
            SUPPORTED_PLATFORMS=iphoneos \
            SUPPORTS_MACCATALYST=NO \
            SKIP_INSTALL=NO \
            SWIFT_OPTIMIZATION_LEVEL="-Onone" \
            SWIFT_WHOLE_MODULE_OPTIMIZATION=NO \
            GCC_OPTIMIZATION_LEVEL=0 \
            clean build \
            BUILD_DIR="$(pwd)/build" \
            2>&1 | tee build_output.log

          BINARY="build/Debug-iphoneos/TranslatorPiP.app/TranslatorPiP"
          if [ -f "$BINARY" ]; then
            SIZE=$(du -sh "$BINARY" | cut -f1)
            echo "✅ Binary found: $BINARY ($SIZE)"
          else
            echo "❌ Binary missing — build failed. Last 50 lines:"
            tail -50 build_output.log
            exit 1
          fi

      - name: Verify and ad-hoc sign extension
        run: |
          set -euo pipefail
          APPEX="build/Debug-iphoneos/TranslatorPiP.app/PlugIns/TranslatorPiPBroadcast.appex"
          if [ -d "$APPEX" ]; then
            echo "✅ Broadcast extension found in PlugIns:"
            ls -la "$APPEX"
            # Ad-hoc sign the extension so SideStore/AltStore can re-sign it properly.
            # Without any signature, some sideloading tools refuse to process extensions.
            codesign --force --sign - "$APPEX"
            echo "✅ Extension ad-hoc signed"
          else
            echo "❌ Extension missing from PlugIns — embedding may have failed"
            ls -la build/Debug-iphoneos/TranslatorPiP.app/ || true
            exit 1
          fi

          # Also ad-hoc sign the main app after signing the extension
          codesign --force --sign - "build/Debug-iphoneos/TranslatorPiP.app"
          echo "✅ Main app ad-hoc signed"

      - name: Package IPA
        run: |
          set -euo pipefail
          APP_PATH="build/Debug-iphoneos/TranslatorPiP.app"
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/
          zip -qr TranslatorPiP_unsigned.ipa Payload

          IPA_SIZE=$(du -sh TranslatorPiP_unsigned.ipa | cut -f1)
          IPA_BYTES=$(stat -f%z TranslatorPiP_unsigned.ipa)
          echo "✅ IPA size: $IPA_SIZE ($IPA_BYTES bytes)"

          # Verify extension is in the IPA
          echo "=== IPA contents (extension check) ==="
          unzip -l TranslatorPiP_unsigned.ipa | grep -E "appex|PlugIns" || echo "(none found)"

          if [ "$IPA_BYTES" -lt 50000 ]; then
            echo "❌ IPA suspiciously small"
            exit 1
          fi

      - name: Publish GitHub Release (public download)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="latest-build"
          REPO="${{ github.repository }}"
          DATE=$(date -u +"%Y-%m-%d %H:%M UTC")
          SHORT_SHA="${{ github.sha }}"
          SHORT_SHA="${SHORT_SHA:0:7}"

          gh release delete "$TAG" --yes --repo "$REPO" 2>/dev/null || true
          git push origin ":refs/tags/$TAG" 2>/dev/null || true

          gh release create "$TAG" \
            --repo "$REPO" \
            --title "TranslatorPiP Unsigned IPA (${DATE})" \
            --notes "**Unsigned IPA — ad-hoc signed for SideStore / AltStore / LiveContainer**

          Build: \`${SHORT_SHA}\` — ${DATE}

          **วิธีติดตั้ง (SideStore):**
          1. ดาวน์โหลด \`TranslatorPiP_unsigned.ipa\`
          2. เพิ่มใน SideStore → ติดตั้ง
          3. ถ้าติดตั้งแล้ว **ต้อง restart เครื่อง 1 ครั้ง** เพื่อให้ iOS ลงทะเบียน Broadcast Extension

          **วิธีใช้จับเสียงภายในเครื่อง:**
          1. เปิดแอพ → กด **เริ่มแปลเสียง**
          2. กดปุ่ม **📡 เปิดรับเสียงภายในเครื่อง** → เลือก TranslatorPiP จาก picker
          3. กด **เปิด PiP** แล้วสลับไปแอพอื่น" \
            --prerelease \
            TranslatorPiP_unsigned.ipa

          echo "✅ Public URL:"
          echo "https://github.com/${REPO}/releases/download/${TAG}/TranslatorPiP_unsigned.ipa"

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build_output.log
          retention-days: 7
