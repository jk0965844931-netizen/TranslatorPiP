name: Build Unsigned IPA

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    name: Build iOS IPA (Unsigned)
    runs-on: macos-14

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Select Xcode version
        run: |
          for v in 16.2 16.1 16.0 15.4 15.3 15.2; do
            if [ -d "/Applications/Xcode_${v}.app" ]; then
              sudo xcode-select -s "/Applications/Xcode_${v}.app/Contents/Developer"
              echo "Selected Xcode ${v}"
              break
            fi
          done
          xcodebuild -version

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build app (unsigned, LiveContainer-compatible)
        run: |
          set -euo pipefail
          xcodebuild \
            -project TranslatorPiP.xcodeproj \
            -scheme TranslatorPiP \
            -configuration Debug \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM="" \
            SUPPORTED_PLATFORMS=iphoneos \
            SUPPORTS_MACCATALYST=NO \
            SKIP_INSTALL=NO \
            SWIFT_OPTIMIZATION_LEVEL="-Onone" \
            SWIFT_WHOLE_MODULE_OPTIMIZATION=NO \
            GCC_OPTIMIZATION_LEVEL=0 \
            clean build \
            BUILD_DIR="$(pwd)/build" \
            2>&1 | tee build_output.log

          # Verify the actual executable binary exists (not just the empty .app folder)
          BINARY="build/Debug-iphoneos/TranslatorPiP.app/TranslatorPiP"
          if [ -f "$BINARY" ]; then
            SIZE=$(du -sh "$BINARY" | cut -f1)
            echo "✅ Binary found: $BINARY ($SIZE)"
          else
            echo "❌ Binary missing — build failed. Last 50 lines:"
            tail -50 build_output.log
            exit 1
          fi

      - name: Package IPA
        run: |
          set -euo pipefail
          APP_PATH="build/Debug-iphoneos/TranslatorPiP.app"
          echo "Packaging: $APP_PATH"
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/
          zip -qr TranslatorPiP_unsigned.ipa Payload
          IPA_SIZE=$(du -sh TranslatorPiP_unsigned.ipa | cut -f1)
          echo "✅ IPA size: $IPA_SIZE"
          # Sanity check — must be > 50KB (Debug builds with -Onone are small but valid)
          IPA_BYTES=$(stat -f%z TranslatorPiP_unsigned.ipa)
          if [ "$IPA_BYTES" -lt 50000 ]; then
            echo "❌ IPA is suspiciously small ($IPA_BYTES bytes) — packaging may have failed"
            exit 1
          fi
          echo "✅ IPA packaging verified ($IPA_BYTES bytes)"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: TranslatorPiP-unsigned-ipa
          path: TranslatorPiP_unsigned.ipa
          retention-days: 30

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build_output.log
          retention-days: 7
